name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tattoo
          POSTGRES_PASSWORD: tattoo
          POSTGRES_DB: tattoo_test
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U tattoo" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libyaml-dev pkg-config google-chrome-stable

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          POSTGRES_USER: tattoo
          POSTGRES_PASSWORD: tattoo
          POSTGRES_DB: tattoo_test
          POSTGRES_HOST: localhost
          REDIS_URL: redis://localhost:6379/1
          WHATSAPP_BUSINESS_PHONE_NUMBER_ID: 123456
        run: bin/rails db:test:prepare test

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    needs: [scan_ruby, scan_js, lint, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy with Kamal
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          HOST: ${{ secrets.HOST }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GEMINI_AI_URL: ${{ secrets.GEMINI_AI_URL }}
          GEMINI_AI_API_KEY: ${{ secrets.GEMINI_AI_API_KEY }}
          RAILS_PORT: ${{ secrets.RAILS_PORT }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          AR_PRIMARY_KEY: ${{ secrets.AR_PRIMARY_KEY }}
          AR_DETERMINISTIC_KEY: ${{ secrets.AR_DETERMINISTIC_KEY }}
          AR_KEY_DERIVATION_SALT: ${{ secrets.AR_KEY_DERIVATION_SALT }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          INSTAGRAM_APP_ID: ${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCOUNT_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCOUNT_ACCESS_TOKEN }}
          INSTAGRAM_VERIFY_CALLBACK_HASH: ${{ secrets.INSTAGRAM_VERIFY_CALLBACK_HASH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_VERIFY_CALLBACK_HASH: ${{ secrets.META_VERIFY_CALLBACK_HASH }}
          SMTP_USER_NAME: ${{ secrets.SMTP_USER_NAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          KAGSO_API_KEY: ${{ secrets.KAGSO_API_KEY }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_BUSINESS_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_BUSINESS_PHONE_NUMBER_ID }}
          WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${{ secrets.WHATSAPP_WEBHOOK_VERIFY_TOKEN }}
          RAILS_ENV: production
        run: kamal deploy
