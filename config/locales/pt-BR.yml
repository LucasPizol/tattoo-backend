pt-BR:
  activerecord:
    errors:
      models:
        # Mensagens genéricas de erro
      messages:
        # Mensagens de validação padrão
        inclusion: "não está incluído na lista"
        exclusion: "está reservado"
        invalid: "não é válido"
        confirmation: "não confere com a confirmação"
        accepted: "precisa ser aceito"
        empty: "não pode ficar em branco"
        blank: "não pode ficar em branco"
        present: "deve estar em branco"
        too_long:
          one: "é muito longo (máximo de 1 caractere)"
          other: "é muito longo (máximo de %{count} caracteres)"
        too_short:
          one: "é muito curto (mínimo de 1 caractere)"
          other: "é muito curto (mínimo de %{count} caracteres)"
        wrong_length:
          one: "não possui o tamanho esperado (deve ter 1 caractere)"
          other: "não possui o tamanho esperado (deve ter %{count} caracteres)"
        not_a_number: "não é um número"
        not_an_integer: "deve ser um número inteiro"
        greater_than:
          one: "deve ser maior que 1"
          other: "deve ser maior que %{count}"
        greater_than_or_equal_to:
          one: "deve ser maior ou igual a 1"
          other: "deve ser maior ou igual a %{count}"
        equal_to:
          one: "deve ser igual a 1"
          other: "deve ser igual a %{count}"
        less_than:
          one: "deve ser menor que 1"
          other: "deve ser menor que %{count}"
        less_than_or_equal_to:
          one: "deve ser menor ou igual a 1"
          other: "deve ser menor ou igual a %{count}"
        other_than:
          one: "deve ser diferente de 1"
          other: "deve ser diferente de %{count}"
        odd: "deve ser ímpar"
        even: "deve ser par"
        taken: "já está em uso"
        record_invalid: "A validação falhou: %{errors}"
        restrict_dependent_destroy:
          one: "não pode ser excluído pois existe 1 %{record} dependente"
          other: "não pode ser excluído pois existem %{count} %{record} dependentes"
